<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PazaSoutien</title>
<style>
  body {
    margin: 0;
    background-color: #b1b8cd; /* fond gris clair */
    font-family: Arial, sans-serif;
    color: #222;
  }
  header {
    position: fixed;
    top: 0; left: 0; right:0;
    height: 50px;
    background-color: #8379c9; /* violet */
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 20px;
    box-sizing: border-box;
    font-weight: bold;
    font-size: 1.1rem;
    z-index: 1000;
  }
  main {
    margin-top: 80px;
    padding: 0 20px;
    max-width: 900px;
    margin-left: auto;
    margin-right: auto;
    text-align: left;
  }
  h1 {
    font-size: 2.2rem;
    margin-bottom: 0.3rem;
  }
  p {
    margin-bottom: 1.5rem;
    font-size: 1rem;
  }
  button {
    background-color: #8379c9; /* bouton violet */
    border: none;
    border-radius: 20px;
    padding: 10px 20px;
    color: white;
    font-weight: bold;
    cursor: pointer;
    font-size: 1rem;
  }
  button:hover {
    background-color: #6a5fc4;
  }
  a {
    color: white;
    text-decoration: none;
  }
</style>
</head>
<body>

<header>
  <div>PazaSoutien</div>
  <nav><a href="#">Accueil</a></nav>
</header>

<main>
  <h1>Soutien Scolaire en Ligne pour Tous les Âges</h1>
  <p>Maths, Français, Anglais, etc.</p>
  <button>Découvrir les Cours</button>
</main>

</body>
</html>
