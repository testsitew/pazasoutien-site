<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PazaSoutien</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    background-color: #c0c8d8; /* couleur douce, proche site */
    color: #333;
  }
  /* Barre de navigation simple */
  .navbar {
    background-color: #746ebc; /* violet */
    color: white;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .logo {
    font-weight: bold;
    font-size: 1.6rem;
  }
  .nav-links a {
    color: white;
    text-decoration: none;
    font-weight: 600;
  }
  /* Section hero simple */
  .hero {
    max-width: 900px;
    margin: 50px auto;
    padding: 20px;
  }
  .hero h1 {
    font-size: 2.5rem;
    margin-bottom: 0.5rem;
  }
  .hero p {
    font-size: 1.1rem;
    margin-bottom: 1.5rem;
  }
  .btn-primary {
    background-color: #746ebc;
    color: white;
    padding: 10px 25px;
    border: none;
    border-radius: 25px;
    font-weight: bold;
    text-decoration: none;
  }
  .btn-primary:hover {
    background-color: #5e59a6;
  }
</style>
</head>
<body>

<header>
  <nav class="navbar">
    <div class="logo">PazaSoutien</div>
    <div class="nav-links">
      <a href="#accueil">Accueil</a>
    </div>
  </nav>
</header>

<section class="hero" id="accueil">
  <h1>Soutien Scolaire en Ligne pour Tous les Âges</h1>
  <p>Maths, Français, Anglais, etc.</p>
  <a href="#cours" class="btn-primary">Découvrir les Cours</a>
</section>

</body>
</html>
